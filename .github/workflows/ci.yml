name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace
      - run: cargo doc --workspace --no-deps
      - run: cargo bench -p propaga-propagators --no-run
      - run: cargo run --example sudoku
      - run: cargo run --example n_queens
      - run: cargo run -p propaga-model --example model_sudoku
      - run: cargo run -p propaga-flatzinc --example flatzinc_solve
      - run: cargo run -p propaga-cli -- sudoku
      - run: cargo run -p propaga-cli -- n-queens --size 8
      - run: cargo run -p propaga-cli -- solve --file benchmarks/magic_square.fzn --quiet
      - run: cargo run -p propaga-cli -- solve --file benchmarks/cumulative.fzn --quiet
      - run: cargo run -p propaga-cli -- solve --file benchmarks/gcc_exact.fzn --quiet
      - run: cargo run -p propaga-cli -- schedule --file benchmarks/schedule_three_tasks.json --quiet
      - run: bash benchmarks/run.sh

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - run: cargo test --workspace

  build-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release -p propaga-cli
      - run: cargo test -p propaga-cli
